{% extends "base.html" %}

{% block title %}Register - MovieBook{% endblock %}

{% block extra_css %}
<style>
    .auth-page {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 100px 20px 50px;
        background: linear-gradient(135deg, var(--dark-bg) 0%, var(--darker-bg) 100%);
        position: relative;
    }

    .auth-page::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: radial-gradient(circle at 70% 20%, rgba(229, 9, 20, 0.1) 0%, transparent 50%);
        pointer-events: none;
    }

    .auth-container {
        width: 100%;
        max-width: 500px;
        position: relative;
        z-index: 1;
    }

    .auth-card {
        background: var(--card-bg);
        border-radius: var(--border-radius);
        padding: 3rem;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        border: 1px solid rgba(255, 255, 255, 0.05);
    }

    .auth-header {
        text-align: center;
        margin-bottom: 2rem;
    }

    .auth-header .logo {
        justify-content: center;
        font-size: 2rem;
        margin-bottom: 1rem;
    }

    .auth-header h2 {
        font-size: 1.8rem;
        margin-bottom: 0.5rem;
    }

    .auth-header p {
        color: var(--text-muted);
    }

    .auth-form .form-group {
        margin-bottom: 1.25rem;
    }

    .auth-form .form-label {
        display: block;
        margin-bottom: 0.5rem;
        font-weight: 500;
    }

    .auth-form .form-control {
        width: 100%;
    }

    .password-toggle {
        position: relative;
    }

    .password-toggle .toggle-btn {
        position: absolute;
        right: 15px;
        top: 50%;
        transform: translateY(-50%);
        background: none;
        border: none;
        color: var(--text-muted);
        cursor: pointer;
    }

    .password-toggle input {
        padding-right: 45px;
    }

    .password-strength {
        margin-top: 0.5rem;
    }

    .strength-bar {
        height: 4px;
        background: rgba(255, 255, 255, 0.1);
        border-radius: 2px;
        overflow: hidden;
    }

    .strength-bar .bar {
        height: 100%;
        width: 0;
        transition: all 0.3s ease;
    }

    .strength-text {
        font-size: 0.75rem;
        color: var(--text-muted);
        margin-top: 0.25rem;
    }

    .form-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 1rem;
    }

    .auth-form .btn {
        width: 100%;
        padding: 1rem;
        font-size: 1rem;
        margin-top: 1rem;
    }

    .terms-text {
        font-size: 0.85rem;
        color: var(--text-muted);
        line-height: 1.5;
    }

    .terms-text a {
        color: var(--primary-color);
    }

    .auth-footer {
        text-align: center;
        margin-top: 2rem;
        color: var(--text-muted);
    }

    .auth-footer a {
        color: var(--primary-color);
        font-weight: 600;
    }

    @media (max-width: 480px) {
        .auth-card {
            padding: 2rem;
        }

        .form-row {
            grid-template-columns: 1fr;
        }
    }
</style>
{% endblock %}

{% block content %}
<div class="auth-page">
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <a href="{{ url_for('index') }}" class="logo">
                    <i class="fas fa-film"></i>
                    Movie<span>Book</span>
                </a>
                <h2>Create Account</h2>
                <p>Join MovieBook and start booking</p>
            </div>
            
            <form method="POST" action="{{ url_for('register') }}" class="auth-form">
                <div class="form-row">
                    <div class="form-group">
                        <label for="name" class="form-label">Full Name</label>
                        <input type="text" id="name" name="name" class="form-control" 
                               placeholder="Enter your name" required minlength="2">
                    </div>
                    
                    <div class="form-group">
                        <label for="phone" class="form-label">Phone Number</label>
                        <input type="tel" id="phone" name="phone" class="form-control" 
                               placeholder="Enter phone number" required minlength="10">
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="email" class="form-label">Email Address</label>
                    <input type="email" id="email" name="email" class="form-control" 
                           placeholder="Enter your email" required>
                </div>
                
                <div class="form-group">
                    <label for="password" class="form-label">Password</label>
                    <div class="password-toggle">
                        <input type="password" id="password" name="password" class="form-control" 
                               placeholder="Create a password" required minlength="6"
                               oninput="updatePasswordStrength()">
                        <button type="button" class="toggle-btn" onclick="togglePassword('password')">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                    <div class="password-strength">
                        <div class="strength-bar">
                            <div class="bar" id="strength-bar"></div>
                        </div>
                        <span class="strength-text" id="strength-text"></span>
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="confirm_password" class="form-label">Confirm Password</label>
                    <div class="password-toggle">
                        <input type="password" id="confirm_password" name="confirm_password" 
                               class="form-control" placeholder="Confirm your password" required>
                        <button type="button" class="toggle-btn" onclick="togglePassword('confirm_password')">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>
                
                <div class="form-group">
                    <label class="form-checkbox">
                        <input type="checkbox" name="terms" required>
                        <span class="terms-text">
                            I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>
                        </span>
                    </label>
                </div>
                
                <button type="submit" class="btn btn-primary">
                    <i class="fas fa-user-plus"></i>
                    Create Account
                </button>
            </form>
            
            <div class="auth-footer">
                Already have an account? <a href="{{ url_for('login') }}">Login here</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    function togglePassword(inputId) {
        const input = document.getElementById(inputId);
        const icon = input.nextElementSibling.querySelector('i');
        
        if (input.type === 'password') {
            input.type = 'text';
            icon.classList.remove('fa-eye');
            icon.classList.add('fa-eye-slash');
        } else {
            input.type = 'password';
            icon.classList.remove('fa-eye-slash');
            icon.classList.add('fa-eye');
        }
    }

    function updatePasswordStrength() {
        const password = document.getElementById('password').value;
        const bar = document.getElementById('strength-bar');
        const text = document.getElementById('strength-text');
        
        let strength = 0;
        if (password.length >= 6) strength += 25;
        if (password.length >= 10) strength += 25;
        if (/[A-Z]/.test(password)) strength += 25;
        if (/[0-9]/.test(password)) strength += 12.5;
        if (/[^A-Za-z0-9]/.test(password)) strength += 12.5;
        
        bar.style.width = strength + '%';
        
        if (strength < 25) {
            bar.style.background = '#e50914';
            text.textContent = 'Weak';
        } else if (strength < 50) {
            bar.style.background = '#f5c518';
            text.textContent = 'Fair';
        } else if (strength < 75) {
            bar.style.background = '#00a8e8';
            text.textContent = 'Good';
        } else {
            bar.style.background = '#46d369';
            text.textContent = 'Strong';
        }
    }
</script>
{% endblock %}
